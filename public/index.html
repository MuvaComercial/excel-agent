<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --accent: #7c5cfc; --accent-h: #6a4de0;
      --text: #f0f0f0; --muted: #888; --ok: #22c55e; --err: #ef4444;
    }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 48px 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 32px; letter-spacing: -0.5px; }
    h1 span { color: var(--accent); }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 20px; }

    label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }

    input[type="text"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }

    .drop-zone {
      border: 2px dashed var(--border); border-radius: 10px; padding: 32px 20px;
      text-align: center; cursor: pointer; transition: border-color .2s;
    }
    .drop-zone:hover, .drop-zone.over { border-color: var(--accent); }
    .drop-zone p { color: var(--muted); font-size: 14px; }
    .drop-zone strong { color: var(--text); }
    #fileInput { display: none; }

    .file-count { font-size: 13px; color: var(--muted); min-height: 18px; }
    .file-count.loaded { color: var(--ok); }

    button {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background .2s;
    }
    button:hover:not(:disabled) { background: var(--accent-h); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    #status { font-size: 14px; text-align: center; min-height: 20px; }
    #status.err { color: var(--err); }
    #status.ok  { color: var(--ok); }

    #result { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; font-size: 13px; }
    #result a { color: var(--accent); text-decoration: none; }
    #result a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Excel <span>Agent</span></h1>

  <div class="card">
    <!-- Título da planilha -->
    <div>
      <label for="title">Nome da planilha</label>
      <input type="text" id="title" placeholder="Ex: F00121_Sessao_01" />
    </div>

    <!-- Seletor de pasta -->
    <div>
      <label>Pasta local</label>
      <div class="drop-zone" id="dropZone">
        <p><strong>Clique para selecionar pasta</strong></p>
        <p>ou arraste e solte arquivos aqui</p>
      </div>
      <input type="file" id="fileInput" webkitdirectory multiple />
      <p class="file-count" id="fileCount">Nenhum arquivo selecionado</p>
    </div>

    <button id="btn" disabled>Gerar Planilha</button>

    <p id="status"></p>
    <div id="result"></div>
  </div>

  <script>
    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileCount = document.getElementById('fileCount');
    const titleEl   = document.getElementById('title');
    const btn       = document.getElementById('btn');
    const statusEl  = document.getElementById('status');
    const resultEl  = document.getElementById('result');

    let selectedFiles = [];

    // Open picker on click
    dropZone.addEventListener('click', () => fileInput.click());

    // Drag events
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('over');
      loadFiles(Array.from(e.dataTransfer.files));
    });

    fileInput.addEventListener('change', () => {
      loadFiles(Array.from(fileInput.files));
    });

    function loadFiles(files) {
      // Filter images and PDFs, sort by name
      selectedFiles = files
        .filter(f => f.type.startsWith('image/') || f.type === 'application/pdf')
        .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

      if (selectedFiles.length === 0) {
        fileCount.textContent = 'Nenhum arquivo de imagem ou PDF encontrado.';
        fileCount.className = 'file-count';
      } else {
        fileCount.textContent = `${selectedFiles.length} arquivo(s) carregado(s)`;
        fileCount.className = 'file-count loaded';
      }
      updateBtn();
    }

    titleEl.addEventListener('input', updateBtn);

    function updateBtn() {
      btn.disabled = !(titleEl.value.trim() && selectedFiles.length > 0);
    }

    btn.addEventListener('click', async () => {
      const title = titleEl.value.trim();
      if (!title || selectedFiles.length === 0) return;

      btn.disabled = true;
      statusEl.className = '';
      statusEl.textContent = `Enviando ${selectedFiles.length} arquivos…`;
      resultEl.style.display = 'none';

      const payload = {
        title,
        files: selectedFiles.map(f => ({ name: f.name }))
      };

      try {
        const res = await fetch('/api/create-sheet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Erro desconhecido');

        statusEl.className = 'ok';
        statusEl.textContent = `Planilha criada com ${data.total} linhas.`;
        resultEl.style.display = 'block';
        resultEl.innerHTML = `<a href="${data.sheetUrl}" target="_blank">Abrir planilha →</a>`;

      } catch (err) {
        statusEl.className = 'err';
        statusEl.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
